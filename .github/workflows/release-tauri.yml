name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            # QUI LA MODIFICA: diciamo a Tauri di non creare gli installer
            # Nota: se usi Tauri v1, cambia '--no-bundle' in '--bundles none'
            args: '--no-bundle' 

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install

      - name: Build and Publish with Tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__-${{ github.sha }}
          releaseName: 'App v__VERSION__-${{ github.sha }}'
          releaseBody: 'Scarica il file .exe portatile qui sotto (Nessuna installazione richiesta).'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Portable Executable as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Portable-Windows
          path: src-tauri/target/release/*.exe
