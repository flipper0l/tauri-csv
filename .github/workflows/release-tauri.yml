name: 'publish'

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: '--no-bundle' 

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm install

      - name: Build Tauri App (Portable Only)
        run: pnpm tauri build ${{ matrix.args }}

      - name: Get app version
        id: app-version
        shell: bash
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Portable Executable as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: App-Portable-Windows
          # Prende il file hello-world.exe mostrato nel tuo log
          path: src-tauri/target/release/hello-world.exe 

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.app-version.outputs.VERSION }}"
          name: "App v${{ steps.app-version.outputs.VERSION }}"
          body: "Scarica il file .exe portatile qui sotto. Nessuna installazione richiesta."
          draft: true
          prerelease: false
          files: src-tauri/target/release/hello-world.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
